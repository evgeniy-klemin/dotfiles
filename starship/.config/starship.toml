"$schema" = 'https://starship.rs/config-schema.json'

palette = "nord"

format = """
$os\
$directory\
$git_branch\
$git_status\
$golang\
$python\
$lua\
$nodejs\
$docker_context\
$kubernetes\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""


[fill]
symbol = " "

[os]
disabled = false
format = "[](fg:polar_night)[ $symbol ](bold fg:snow bg:polar_night)[](fg:polar_night)"

[os.symbols]
Macos = "п…№"

[character]
success_symbol = "[вқҜ](bold fg:frost_green)"
error_symbol = "[вқҜ](bold fg:aurora_red)"
vimcmd_symbol = "[вқ®](bold fg:frost_green)"
vimcmd_replace_one_symbol = "[вқ®](bold fg:aurora_purple)"
vimcmd_replace_symbol = "[вқ®](bold fg:aurora_purple)"

[directory]
format = "[оӮ¶](fg:frost_blue)[ $path$read_only ](bold fg:polar_dark bg:frost_blue)[оӮҙ](fg:frost_blue)"
truncation_length = 4
truncate_to_repo = true
read_only = " пҖЈ"
home_symbol = " пҖ• ~"

[directory.substitutions]
"Documents" = "п…ӣ "
"Downloads" = "пҖҷ "
"projects" = "пҒ» "

[git_branch]
format = "[оӮ¶](fg:aurora_green)[ оӮ  $branch ](bold fg:polar_dark bg:aurora_green)[оӮҙ](fg:aurora_green)"

[git_status]
format = '([оӮ¶](fg:aurora_orange)[ $all_status$ahead_behind ](bold fg:polar_dark bg:aurora_orange)[оӮҙ](fg:aurora_orange))'
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮЎ${ahead_count}вҮЈ${behind_count}"
conflicted = "=${count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "вңҳ${count}"

[golang]
format = "[оӮ¶](fg:frost_cyan)[ оҳ§ ($version) ](bold fg:polar_dark bg:frost_cyan)[оӮҙ](fg:frost_cyan)"

[python]
format = "[оӮ¶](fg:aurora_yellow)[ оҲө ${pyenv_prefix}(${version} )((${virtualenv}) )](bold fg:polar_dark bg:aurora_yellow)[оӮҙ](fg:aurora_yellow)"

[lua]
format = "[оӮ¶](fg:frost_blue)[ оҳ  ($version) ](bold fg:polar_dark bg:frost_blue)[оӮҙ](fg:frost_blue)"

[nodejs]
format = "[оӮ¶](fg:aurora_green)[ оңҳ ($version) ](bold fg:polar_dark bg:aurora_green)[оӮҙ](fg:aurora_green)"

[kubernetes]
disabled = false
format = "[оӮ¶]($style)[ вҳё $context( ($namespace)) ](bold fg:polar_dark bg:$style)[оӮҙ]($style)"
style = "aurora_purple"

# Production вҖ” red background
[[kubernetes.contexts]]
context_pattern = "prod.*"
style = "aurora_red"

[docker_context]
format = "[оӮ¶](fg:frost_deep)[ пҢҲ $context ](bold fg:snow bg:frost_deep)[оӮҙ](fg:frost_deep)"

[cmd_duration]
min_time = 3_000
format = "[оӮ¶](fg:aurora_yellow)[ пү’ $duration ](bold fg:polar_dark bg:aurora_yellow)[оӮҙ](fg:aurora_yellow)"

[time]
disabled = false
format = "[оӮ¶](fg:polar_night)[ пҖ— $time](bold fg:snow bg:polar_night)[оӮҙ](fg:polar_night)"
time_format = "%H:%M"

[username]
format = "[оӮ¶](fg:polar_night)[ $user ](bold fg:snow bg:polar_night)[оӮҙ](fg:polar_night)"
show_always = false

[hostname]
ssh_only = true
format = "[оӮ¶](fg:polar_night)[ @$hostname ](bold fg:snow bg:polar_night)[оӮҙ](fg:polar_night)"

# Nord palette
[palettes.nord]
# Polar Night
polar_dark = "#2E3440"
polar_night = "#3B4252"
polar_bright = "#434C5E"
polar_light = "#4C566A"
# Snow Storm
snow_dim = "#D8DEE9"
snow = "#E5E9F0"
snow_bright = "#ECEFF4"
# Frost
frost_cyan = "#8FBCBB"
frost_blue = "#81A1C1"
frost_light = "#88C0D0"
frost_deep = "#5E81AC"
frost_green = "#A3BE8C"
# Aurora
aurora_green = "#A3BE8C"
aurora_orange = "#FFB86C"
aurora_yellow = "#EBCB8B"
aurora_red = "#BF616A"
aurora_purple = "#BD93F9"
